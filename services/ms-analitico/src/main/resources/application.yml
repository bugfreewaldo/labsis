spring:
  application:
    name: ms-analitico
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://pg-primary:5432/labsis}
    username: ${SPRING_DATASOURCE_USERNAME:labsis}
    password: ${SPRING_DATASOURCE_PASSWORD:labsis}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: analitico
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:redpanda:29092}
    consumer:
      group-id: ms-analitico
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

opa:
  url: ${OPA_URL:http://opa:8181}
  package: labsis/autovalidacion

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      opa:
        registerHealthIndicator: true
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 10
  retry:
    instances:
      opa:
        maxAttempts: 3
        waitDuration: 200ms
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - org.springframework.web.reactive.function.client.WebClientRequestException
  bulkhead:
    instances:
      opa:
        maxConcurrentCalls: 10
  timelimiter:
    instances:
      opa:
        timeoutDuration: 2s
