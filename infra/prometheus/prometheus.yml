global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'spring-services'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - 'ms-pacientes:8080'
          - 'ms-muestras:8080'
          - 'ms-analitico:8080'
          - 'ms-bi:8080'

  - job_name: 'ia-mapper'
    metrics_path: /metrics
    static_configs:
      - targets: ['ia-mapper:8000']
